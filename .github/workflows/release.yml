name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Verify config.yaml version matches tag
        run: |
          CONFIG_VER=$(grep '^version:' habitus/config.yaml | awk '{print $2}' | tr -d '"')
          TAG_VER="${{ steps.version.outputs.VERSION }}"
          if [ "$CONFIG_VER" != "$TAG_VER" ]; then
            echo "Version mismatch: config.yaml=$CONFIG_VER tag=$TAG_VER"
            exit 1
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            habitus/config.yaml
