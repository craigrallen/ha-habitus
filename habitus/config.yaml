name: "Habitus"
description: "Behavioral intelligence — learns patterns from HA, detects anomalies, proposes automations."
version: "3.9.1"
slug: "habitus"
init: false
arch:
  - aarch64
  - amd64
  - armv7
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:brain
panel_title: Habitus
map:
  - homeassistant_config:ro
  - data:rw
  - config:rw
  - share:rw
options:
  scan_interval_hours: 6
  days_history: 365
  notify_service: "notify.notify"
  notify_on_anomaly: true
  anomaly_threshold: 70
  training_schedule: "overnight"
  overnight_train_time: "02:00"
  max_power_kw: 25
  power_entity: ""
  kwh_price: 3.0
  currency: "kr"
schema:
  scan_interval_hours: int
  days_history: int?
  notify_service: str
  notify_on_anomaly: bool
  anomaly_threshold: int
  training_schedule: "list(continuous|overnight)"
  overnight_train_time: str
  max_power_kw: int?
  power_entity: str?
  kwh_price: float?
  currency: str?
