name: "Habitus"
description: "Behavioral intelligence — learns patterns from HA, detects anomalies, proposes automations."
version: "0.12.0"
slug: "habitus"
init: false
arch:
  - aarch64
  - amd64
  - armv7
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:brain
panel_title: Habitus
map:
  - homeassistant_config:ro
  - data:rw
options:
  scan_interval_hours: 6
  days_history: 3650
  notify_service: "notify.notify"
  notify_on_anomaly: true
  anomaly_threshold: 70
schema:
  scan_interval_hours: int
  days_history: int
  notify_service: str
  notify_on_anomaly: bool
  anomaly_threshold: int
